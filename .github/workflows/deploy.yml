name: Build and deploy Python project to Azure Function App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # determine-environment:
  #   runs-on: ubuntu-latest
  #   outputs:
  #     environment: ${{ steps.set-env.outputs.environment }}
  #   steps:
  #     - name: Set environment
  #       id: set-env
  #       run: |
  #         if [ "$GITHUB_REF" == "refs/heads/main" ]; then
  #           ENVIRONMENT=production
  #         elif [ "$GITHUB_REF" == "refs/heads/stage" ]; then
  #           ENVIRONMENT=stage
  #         else
  #           echo "Error: This workflow can only be run from main or stage branches"
  #           exit 1
  #         fi
  #         echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT

  deploy:
    # needs: determine-environment
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Create .python_packages folder
        run: mkdir -p .python_packages/lib

      - name: Install the project dependencies
        run: uv sync --locked --all-extras --dev

      - name: Copy the project dependencies to the .python_packages folder
        run: cp -r .venv/lib/python3.13/site-packages .python_packages/lib/

      - name: Remove uv auto-generated files
        run: rm .python_packages/lib/site-packages/_virtualenv.*

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          subscription-id: ${{ secrets.AZURE_TENANT_ID }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1.5.3
        with:
          app-name: ${{ vars.APPLICATION_NAME }}
          package: .
          remote-build: true
          respect-funcignore: true
  